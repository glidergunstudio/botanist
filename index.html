<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1a08">
<title>Botanist — 植物学者</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0b1407;
  --bg2: #111c09;
  --panel: #162010;
  --border: #2a3d18;
  --green: #7ec850;
  --green2: #4a8c20;
  --green-dim: #2e5c10;
  --gold: #d4ac4c;
  --gold2: #8a6c1a;
  --text: #d0e8b0;
  --text2: #7a9c58;
  --text3: #4a6030;
  --rare: #b06cd0;
  --uncommon: #4aa8d8;
  --danger: #d06060;
  --warn: #d8a840;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; }

/* APP SHELL */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; z-index: 100;
}
.logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--green); letter-spacing: 1px; margin-right: 4px; }
.logo em { color: var(--gold); font-style: italic; }
.stats { display: flex; gap: 8px; margin-left: auto; }
.stat { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--text2); }
.stat strong { color: var(--green); }

.content { flex: 1; overflow: hidden; position: relative; }
.screen { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; display: none; }
.screen.active { display: block; }

/* BOTTOM NAV */
.bottom-nav {
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; flex-shrink: 0;
  padding-bottom: var(--safe-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px; background: none; border: none; color: var(--text3);
  font-family: 'Noto Sans JP', sans-serif; font-size: 10px; gap: 3px; cursor: pointer;
  transition: color .2s; position: relative;
}
.nav-btn .icon { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--green); }
.nav-btn .badge {
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: var(--gold); color: var(--bg); border-radius: 10px;
  font-size: 9px; font-weight: 700; padding: 1px 5px; min-width: 16px; text-align: center;
}

/* MAP */
#mapEl { width: 100%; height: 100%; }
.map-screen { padding: 0; }
.map-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
  background: linear-gradient(transparent, var(--bg2)cc);
  padding: 20px 16px 16px;
}
.walk-btn {
  width: 100%; background: var(--green2); border: 2px solid var(--green);
  border-radius: 50px; padding: 14px; color: var(--bg); font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 24px var(--green)44;
}
.walk-btn:active { transform: scale(.97); }
.walk-btn:disabled { background: var(--bg2); border-color: var(--border); color: var(--text3); box-shadow: none; }
.map-info { font-size: 12px; color: var(--text2); text-align: center; margin-top: 8px; }
.seed-popup {
  background: var(--panel); border: 2px solid var(--gold); border-radius: 14px;
  padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  animation: slideUp .3s;
}
.seed-popup-icon { font-size: 28px; }
.seed-popup-info { flex: 1; }
.seed-popup-name { font-size: 14px; font-weight: 700; color: var(--gold); }
.seed-popup-sub { font-size: 12px; color: var(--text3); }
.seed-popup-btn { background: var(--gold2); border: 1px solid var(--gold); border-radius: 8px; padding: 8px 14px; color: var(--gold); font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }

/* SEED BAG */
.page-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
.page-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }
.page-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.seed-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.seed-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: border-color .2s;
}
.seed-card:active { border-color: var(--green-dim); background: var(--bg2); }
.seed-card .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.seed-card-info { flex: 1; min-width: 0; }
.seed-card-name { font-size: 14px; font-weight: 700; color: var(--text); }
.seed-card-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.seed-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.chip { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-family: inherit; cursor: pointer; border: 1px solid; transition: all .15s; font-weight: 600; }
.chip-green { background: var(--green-dim); color: var(--green); border-color: var(--green); }
.chip-gold { background: var(--gold2)88; color: var(--gold); border-color: var(--gold2); }
.chip:active { opacity: .7; }
.empty-state { padding: 60px 20px; text-align: center; color: var(--text3); }
.empty-state .icon { font-size: 48px; opacity: .4; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* PLANTER */
.planter-grid { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.planter-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
}
.planter-card-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.plant-icon { font-size: 32px; }
.plant-header-info { flex: 1; }
.plant-name { font-size: 15px; font-weight: 700; color: var(--text); }
.plant-stage-label { font-size: 11px; color: var(--text3); margin-top: 1px; }
.health-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 700; }
.h-good { background: var(--green-dim); color: var(--green); }
.h-warn { background: #3a2800; color: var(--warn); }
.h-bad { background: #380000; color: var(--danger); }
.planter-params { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.param-row { display: flex; align-items: center; gap: 8px; }
.param-lbl { font-size: 11px; color: var(--text3); width: 56px; flex-shrink: 0; }
.bar-bg { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .6s; }
.bar-ok { background: var(--green); }
.bar-warn { background: var(--warn); }
.bar-bad { background: var(--danger); }
.param-val { font-size: 11px; color: var(--text2); width: 32px; text-align: right; }
.growth-bar { display: flex; gap: 3px; padding: 0 14px 10px; }
.growth-seg { flex: 1; height: 4px; border-radius: 2px; background: var(--bg); transition: background .5s; }
.growth-seg.done { background: var(--green); }
.planter-actions { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
.empty-planter {
  padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text3); cursor: pointer; border: 1px dashed var(--border); border-radius: 14px;
  background: var(--panel);
}
.empty-planter:active { background: var(--bg2); }

/* GENE */
.gene-section { padding: 16px; }
.section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.gene-slot {
  background: var(--panel); border: 1px dashed var(--border); border-radius: 12px;
  padding: 14px; margin-bottom: 10px;
}
.gene-slot.filled { border-style: solid; border-color: var(--rare); background: #1a0a2a; }
.gene-slot-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.gene-slot-icon { font-size: 28px; }
.gene-slot-name { font-size: 14px; font-weight: 700; flex: 1; }
.gene-traits { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.trait-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--text2); }
.gene-select { display: flex; flex-direction: column; gap: 6px; }
.gene-option { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.gene-option:active { background: var(--bg); }
.cross-result { background: var(--bg2); border: 1px solid var(--rare); border-radius: 12px; padding: 16px; text-align: center; margin-top: 10px; animation: slideUp .3s; }
.cross-result-icon { font-size: 48px; margin-bottom: 8px; }
.cross-result-name { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--rare); margin-bottom: 4px; }

/* MARKET */
.market-section { padding: 16px; }
.market-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--bg2); border-radius: 10px; padding: 4px; }
.market-tab { flex: 1; padding: 8px; border: none; background: none; border-radius: 8px; font-family: inherit; font-size: 13px; color: var(--text3); cursor: pointer; transition: all .2s; }
.market-tab.active { background: var(--green-dim); color: var(--green); }
.listing-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.listing-icon { font-size: 28px; }
.listing-info { flex: 1; }
.listing-name { font-size: 14px; font-weight: 700; }
.listing-seller { font-size: 11px; color: var(--text3); margin-top: 2px; }
.listing-price { text-align: right; }
.listing-price .price { font-size: 18px; font-weight: 700; color: var(--gold); }
.listing-price .qty { font-size: 11px; color: var(--text3); }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: #000c; z-index: 2000; display: flex; align-items: flex-end; }
.modal-bg.center { align-items: center; justify-content: center; padding: 16px; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(24px + var(--safe-bottom)); width: 100%;
  max-height: 80vh; overflow-y: auto; animation: sheetUp .3s;
}
.modal-bg.center .modal { border-radius: 20px; padding: 24px 20px; max-width: 400px; }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 14px; line-height: 1.7; }
.modal input {
  width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; font-family: inherit; font-size: 15px; color: var(--text); outline: none;
  margin-bottom: 12px; transition: border-color .2s;
}
.modal input:focus { border-color: var(--green-dim); }
.modal-btns { display: flex; gap: 8px; }
.btn { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
.btn:active { opacity: .8; }
.btn-primary { background: var(--green2); border-color: var(--green); color: var(--bg); }
.btn-secondary { background: transparent; border-color: var(--border); color: var(--text3); }
.btn-gold { background: var(--gold2); border-color: var(--gold); color: var(--gold); }
.btn-purple { background: #2a0a3a; border-color: var(--rare); color: var(--rare); }

/* NOTIFICATION TOAST */
.toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  background: var(--panel); border: 1px solid var(--green-dim); border-radius: 30px;
  padding: 10px 20px; font-size: 13px; color: var(--text); z-index: 3000;
  box-shadow: 0 8px 30px #0008; white-space: nowrap;
  animation: toastIn .3s; pointer-events: none;
}
.toast.gold { border-color: var(--gold2); }
.toast.rare { border-color: var(--rare); }
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%); } }

/* LEAFLET CUSTOM */
.leaflet-container { background: #0b1407; }
.seed-marker-inner {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--gold); border: 2px solid var(--bg);
  box-shadow: 0 0 10px var(--gold)aa;
  animation: markerPulse 2s infinite;
}
.seed-marker-inner.rare { background: var(--rare); box-shadow: 0 0 10px var(--rare)aa; }
@keyframes markerPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

/* RARITY */
.r-common { color: #888; }
.r-uncommon { color: var(--uncommon); }
.r-rare { color: var(--rare); }
.r-legendary { color: var(--gold); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <span class="logo">Bot<em>anist</em></span>
    <div class="stats">
      <div class="stat">Lv.<strong id="skillLvEl">2</strong></div>
      <div class="stat">🌰<strong id="seedCountEl">3</strong></div>
      <div class="stat">💰<strong id="goldEl">1200</strong>G</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- MAP -->
    <div class="screen active" id="screen-map" style="padding:0;display:flex;flex-direction:column;">
      <div id="mapEl" style="flex:1"></div>
      <div class="map-overlay" id="mapOverlay">
        <div id="nearbyPopup"></div>
        <button class="walk-btn" id="walkBtn" onclick="doWalk()">🚶 この周辺を散策する</button>
        <div class="map-info" id="mapInfo">地図上の光点に近づいて種を拾おう</div>
      </div>
    </div>

    <!-- SEED BAG -->
    <div class="screen" id="screen-seeds">
      <div class="page-header">
        <div class="page-title">種袋</div>
        <div class="page-sub">集めた種の一覧。タップして詳細を確認</div>
      </div>
      <div id="seedList" class="seed-list"></div>
    </div>

    <!-- PLANTER -->
    <div class="screen" id="screen-planter">
      <div class="page-header">
        <div class="page-title">プランター</div>
        <div class="page-sub">植物の生育状況を管理する</div>
      </div>
      <div id="planterGrid" class="planter-grid"></div>
    </div>

    <!-- GENE -->
    <div class="screen" id="screen-gene">
      <div class="page-header">
        <div class="page-title">交配室</div>
        <div class="page-sub">2株の遺伝子を掛け合わせて新種を生み出す</div>
      </div>
      <div id="geneContent"></div>
    </div>

    <!-- MARKET -->
    <div class="screen" id="screen-market">
      <div class="page-header">
        <div class="page-title">市場</div>
        <div class="page-sub">種を売買する非同期マーケット</div>
      </div>
      <div id="marketContent"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-map" onclick="goTab('map')">
      <span class="icon">🗺</span>地図
    </button>
    <button class="nav-btn" id="nav-seeds" onclick="goTab('seeds')">
      <span class="icon">🌰</span>種袋
      <span class="badge" id="seedBadge" style="display:none"></span>
    </button>
    <button class="nav-btn" id="nav-planter" onclick="goTab('planter')">
      <span class="icon">🪴</span>プランター
    </button>
    <button class="nav-btn" id="nav-gene" onclick="goTab('gene')">
      <span class="icon">🧬</span>交配
    </button>
    <button class="nav-btn" id="nav-market" onclick="goTab('market')">
      <span class="icon">🏪</span>市場
    </button>
  </nav>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalEl">
    <div class="modal-handle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// =====================================================
// DATA
// =====================================================
const PLANTS = [
  { id:'rosa', name:'バラ', sci:'Rosa canina', emoji:'🌹', rarity:'common',
    traits:{ 色:'紅', 大きさ:'中', 香り:'強', 花弁:'重弁' },
    genes:{ C:'Rr', S:'Mm', F:'Ff' },
    cond:{ temp:[18,28], ph:[5.5,7.0], water:[60,80], fert:[40,60], light:[70,100] },
    growth:5, seeds:[2,5] },
  { id:'violet', name:'スミレ', sci:'Viola odorata', emoji:'💜', rarity:'uncommon',
    traits:{ 色:'紫', 大きさ:'小', 香り:'中', 花弁:'単弁' },
    genes:{ C:'vv', S:'ss', F:'Ff' },
    cond:{ temp:[10,20], ph:[6.0,7.5], water:[50,70], fert:[20,40], light:[40,70] },
    growth:4, seeds:[3,7] },
  { id:'sunflower', name:'ヒマワリ', sci:'Helianthus annuus', emoji:'🌻', rarity:'common',
    traits:{ 色:'黄', 大きさ:'大', 香り:'無', 花弁:'舌状' },
    genes:{ C:'YY', S:'LL', F:'ff' },
    cond:{ temp:[22,35], ph:[6.0,7.5], water:[40,60], fert:[50,70], light:[80,100] },
    growth:7, seeds:[10,20] },
  { id:'lily', name:'ユリ', sci:'Lilium longiflorum', emoji:'🌷', rarity:'uncommon',
    traits:{ 色:'白', 大きさ:'大', 香り:'強', 花弁:'trumpet' },
    genes:{ C:'Ww', S:'LL', F:'FF' },
    cond:{ temp:[15,25], ph:[6.0,7.0], water:[55,75], fert:[45,65], light:[60,90] },
    growth:9, seeds:[1,3] },
  { id:'cactus', name:'サボテン', sci:'Cereus sp.', emoji:'🌵', rarity:'rare',
    traits:{ 色:'緑', 大きさ:'中', 香り:'無', 花弁:'管状' },
    genes:{ C:'gg', S:'Mm', F:'ff' },
    cond:{ temp:[25,40], ph:[6.0,8.0], water:[5,20], fert:[5,20], light:[90,100] },
    growth:15, seeds:[2,6] },
  { id:'moss', name:'コケ', sci:'Bryophyta sp.', emoji:'🌿', rarity:'rare',
    traits:{ 色:'緑', 大きさ:'微小', 香り:'土', 花弁:'無' },
    genes:{ C:'gg', S:'mm', F:'ff' },
    cond:{ temp:[5,20], ph:[4.5,6.5], water:[75,95], fert:[5,15], light:[10,40] },
    growth:12, seeds:[0,0] },
];
const RARITY = {
  common:    { label:'普通',   color:'#888888', weight:60 },
  uncommon:  { label:'珍しい', color:'#4aa8d8', weight:30 },
  rare:      { label:'レア',   color:'#b06cd0', weight:9  },
  legendary: { label:'伝説',   color:'#d4ac4c', weight:1  },
};
const STAGES = ['発芽待ち','発芽','生育中','成熟前','開花中','結実'];
const MARKET_DATA = [
  { id:'m1', plant:PLANTS[0], price:50,  qty:3, seller:'Hanako' },
  { id:'m2', plant:PLANTS[3], price:150, qty:1, seller:'Taro'   },
  { id:'m3', plant:PLANTS[4], price:320, qty:2, seller:'Kenji'  },
];

// =====================================================
// STATE
// =====================================================
const S = {
  skillLv: 2,
  gold: 1200,
  seeds: [
    { id:uid(), plant:PLANTS[0], reveal:'species', label:'バラ' },
    { id:uid(), plant:PLANTS[1], reveal:'species', label:'スミレ' },
    { id:uid(), plant:PLANTS[2], reveal:'species', label:'ヒマワリ' },
  ],
  planters: Array(6).fill(null),
  mapSeeds: [],
  discoveries: {},
  hybridSlots: [null, null],
  walkCd: false,
  tab: 'map',
  playerLatLng: null,
  map: null,
  playerMarker: null,
  nearbyIds: [],
};

// =====================================================
// UTILS
// =====================================================
function uid() { return Math.random().toString(36).slice(2,9); }
function rand(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function clamp(v,a,b) { return Math.max(a,Math.min(b,v)); }
function randPlant() { return PLANTS[rand(0,PLANTS.length-1)]; }
function revealLabel(plant, lv) {
  if(lv>=3) return plant.name;
  if(lv>=2) return plant.sci.split(' ')[0]+'属の種';
  return '不明な種';
}
function healthStatus(h) {
  return h>70 ? ['good','良好'] : h>40 ? ['warn','注意'] : ['bad','危険'];
}
function barClass(v, range) {
  if(v<range[0]-10||v>range[1]+10) return 'bar-bad';
  if(v<range[0]||v>range[1]) return 'bar-warn';
  return 'bar-ok';
}

// =====================================================
// TOAST
// =====================================================
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .4s'; }, 2000);
  setTimeout(()=>el.remove(), 2500);
}

// =====================================================
// STATS
// =====================================================
function updateStats() {
  document.getElementById('skillLvEl').textContent = S.skillLv;
  document.getElementById('seedCountEl').textContent = S.seeds.length;
  document.getElementById('goldEl').textContent = S.gold;
  const badge = document.getElementById('seedBadge');
  if(S.seeds.length > 0) { badge.style.display=''; badge.textContent=S.seeds.length; }
  else badge.style.display='none';
}

// =====================================================
// TAB
// =====================================================
function goTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='seeds') renderSeeds();
  if(tab==='planter') renderPlanter();
  if(tab==='gene') renderGene();
  if(tab==='market') renderMarket();
}

// =====================================================
// MAP
// =====================================================
function initMap() {
  const map = L.map('mapEl', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
  }).addTo(map);
  S.map = map;

  // Try GPS
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const latlng = [pos.coords.latitude, pos.coords.longitude];
        S.playerLatLng = latlng;
        map.setView(latlng, 16);
        updatePlayerMarker(latlng);
        spawnMapSeeds(latlng);
        document.getElementById('mapInfo').textContent = 'GPS取得成功！近くの種を探してみよう';
      },
      () => {
        // Fallback: Tokyo
        const latlng = [35.6812, 139.7671];
        S.playerLatLng = latlng;
        map.setView(latlng, 15);
        updatePlayerMarker(latlng);
        spawnMapSeeds(latlng);
        document.getElementById('mapInfo').textContent = 'GPSを許可すると現在地で遊べます';
      }
    );
  }
}

function updatePlayerMarker(latlng) {
  if(S.playerMarker) S.playerMarker.remove();
  const icon = L.divIcon({
    html:`<div style="width:18px;height:18px;border-radius:50%;background:#7ec850;border:3px solid #0b1407;box-shadow:0 0 0 8px #7ec85033,0 0 20px #7ec85088"></div>`,
    iconSize:[18,18], iconAnchor:[9,9], className:''
  });
  S.playerMarker = L.marker(latlng, {icon}).addTo(S.map);
}

function spawnMapSeeds(center) {
  S.mapSeeds.forEach(ms => { if(ms.marker) ms.marker.remove(); });
  S.mapSeeds = [];
  for(let i=0;i<8;i++) {
    const latOffset = (Math.random()-.5)*0.012;
    const lngOffset = (Math.random()-.5)*0.015;
    const plant = randPlant();
    const isRare = plant.rarity==='rare'||plant.rarity==='legendary';
    const latlng = [center[0]+latOffset, center[1]+lngOffset];
    const icon = L.divIcon({
      html:`<div class="seed-marker-inner ${isRare?'rare':''}"></div>`,
      iconSize:[16,16], iconAnchor:[8,8], className:''
    });
    const marker = L.marker(latlng, {icon}).addTo(S.map);
    const ms = { id:uid(), plant, latlng, marker, collected:false };
    marker.on('click', ()=>tryPickup(ms.id));
    S.mapSeeds.push(ms);
  }
}

function tryPickup(msId) {
  const ms = S.mapSeeds.find(m=>m.id===msId);
  if(!ms||ms.collected) return;
  if(!S.playerLatLng) return;
  const d = S.map.distance(S.playerLatLng, ms.latlng);
  if(d > 300) { toast('まだ遠すぎます。散策して近づきましょう'); return; }
  collectSeed(ms);
}

function collectSeed(ms) {
  ms.collected = true;
  ms.marker.remove();
  const lv = S.skillLv;
  const reveal = lv>=3?'species':lv>=2?'genus':'unknown';
  const seed = { id:uid(), plant:ms.plant, reveal, label:revealLabel(ms.plant, lv) };
  S.seeds.push(seed);
  updateStats();
  const isNew = !S.discoveries[ms.plant.id];
  toast(isNew ? `🌟 初発見の可能性！「${seed.label}」を拾った` : `🌰 「${seed.label}」を拾った`, isNew?'gold':'');
  checkNearby();
}

function doWalk() {
  if(S.walkCd||!S.playerLatLng) return;
  S.walkCd = true;
  const btn = document.getElementById('walkBtn');
  btn.disabled = true; btn.textContent = '🚶 散策中...';
  // Simulate moving
  const newLat = S.playerLatLng[0] + (Math.random()-.5)*0.004;
  const newLng = S.playerLatLng[1] + (Math.random()-.5)*0.005;
  S.playerLatLng = [newLat, newLng];
  S.map.panTo(S.playerLatLng, {animate:true, duration:1.5});
  updatePlayerMarker(S.playerLatLng);
  setTimeout(()=>{
    S.walkCd = false;
    btn.disabled = false; btn.textContent = '🚶 この周辺を散策する';
    checkNearby();
    // Auto-respawn if many collected
    const remaining = S.mapSeeds.filter(m=>!m.collected).length;
    if(remaining < 3) spawnMapSeeds(S.playerLatLng);
  }, 2000);
}

function checkNearby() {
  if(!S.playerLatLng) return;
  const nearby = S.mapSeeds.filter(ms => {
    if(ms.collected) return false;
    return S.map.distance(S.playerLatLng, ms.latlng) < 300;
  });
  const popup = document.getElementById('nearbyPopup');
  if(nearby.length > 0) {
    const ms = nearby[0];
    const isRare = ms.plant.rarity==='rare'||ms.plant.rarity==='legendary';
    popup.innerHTML = `
      <div class="seed-popup">
        <div class="seed-popup-icon">${isRare?'✨':'🌰'}</div>
        <div class="seed-popup-info">
          <div class="seed-popup-name">${isRare?'珍しい種が近くに！':'近くに種があります'}</div>
          <div class="seed-popup-sub">タップして拾う</div>
        </div>
        <button class="seed-popup-btn" onclick="collectSeed(S.mapSeeds.find(m=>m.id==='${ms.id}'))">拾う</button>
      </div>`;
  } else {
    popup.innerHTML = '';
  }
}

function renderSeeds() {
  const el = document.getElementById('seedList');
  if(S.seeds.length===0) {
    el.innerHTML=`<div class="empty-state"><div class="icon">🌰</div><p>種袋が空です<br>地図で種を探しましょう</p></div>`;
    return;
  }
  el.innerHTML = S.seeds.map(s=>{
    const rc = RARITY[s.plant.rarity];
    return `<div class="seed-card">
      <div class="dot" style="background:${rc.color}"></div>
      <div class="seed-card-info">
        <div class="seed-card-name">${s.label}</div>
        <div class="seed-card-sub r-${s.plant.rarity}">${rc.label}</div>
      </div>
      <div class="seed-card-actions">
        <button class="chip chip-green" onclick="openPlantModal('${s.id}')">植える</button>
        <button class="chip chip-gold" onclick="sellSeed('${s.id}')">売る</button>
      </div>
    </div>`;
  }).join('');
}

function sellSeed(id) {
  const s = S.seeds.find(x=>x.id===id);
  if(!s) return;
  const price = {common:30,uncommon:80,rare:200,legendary:1000}[s.plant.rarity];
  S.seeds = S.seeds.filter(x=>x.id!==id);
  S.gold += price;
  updateStats(); renderSeeds();
  toast(`💰 ${s.label}を${price}Gで売却`, 'gold');
}

// PLANTER

function openPlantModal(seedId) {
  const seed = S.seeds.find(s=>s.id===seedId);
  if(!seed) return;
  const empty = S.planters.findIndex(p=>p===null);
  if(empty===-1) { toast('プランターが満杯です'); return; }
  showModal(`
    <h2>🪴 種を植える</h2>
    <p>「${seed.label}」をプランター${empty+1}番に植えますか？</p>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">戻る</button>
      <button class="btn btn-primary" onclick="plantSeed('${seedId}',${empty})">植える</button>
    </div>`);
}

function plantSeed(seedId, slot) {
  const seed = S.seeds.find(s=>s.id===seedId);
  if(!seed) return;
  S.seeds = S.seeds.filter(s=>s.id!==seedId);
  S.planters[slot] = {
    id: uid(), plant: seed.plant, slot, stage:0, age:0,
    params:{ temp:22, ph:6.5, water:65, fert:45, light:75 },
    health:100, harvested:false,
  };
  closeModal(); updateStats();
  if(S.tab==='seeds') renderSeeds();
  toast(`🌱 プランター${slot+1}番に植えました`);
  startGrowth(slot);
}

function startGrowth(slot) {
  const timer = setInterval(()=>{
    const p = S.planters[slot];
    if(!p||p.harvested){ clearInterval(timer); return; }
    p.age++;
    const c = p.plant.cond;
    let pen = 0;
    if(p.params.temp<c.temp[0]-5||p.params.temp>c.temp[1]+5) pen+=2;
    if(p.params.water<c.water[0]-10||p.params.water>c.water[1]+10) pen+=2;
    if(p.params.fert<c.fert[0]-10) pen+=1;
    if(p.params.light<c.light[0]-10) pen+=1;
    p.health = clamp(p.health - pen + (pen===0?0.3:0), 0, 100);
    p.params.water = clamp(p.params.water - rand(1,3), 0, 100);
    p.params.fert  = clamp(p.params.fert  - rand(0,2), 0, 100);
    const thresholds = [1,3,6,10,15];
    const newStage = thresholds.filter(t=>p.age>=t).length;
    if(newStage!==p.stage){ p.stage=newStage; }
    if(p.stage>=5){
      toast(`🌸 プランター${slot+1}が結実！収穫しよう`, 'gold');
      clearInterval(timer);
    }
    if(p.health<=0){
      toast(`💀 プランター${slot+1}の植物が枯れました`);
      S.planters[slot]=null;
      clearInterval(timer);
    }
    if(S.tab==='planter') renderPlanter();
    updateStats();
  }, 5000);
}

function renderPlanter() {
  const el = document.getElementById('planterGrid');
  el.innerHTML = S.planters.map((p,i)=>{
    if(!p) return `
      <div class="empty-planter" onclick="showPlantPicker(${i})">
        <div style="font-size:28px;opacity:.3">🪴</div>
        <div style="font-size:13px">プランター${i+1} — 空</div>
        <div style="font-size:11px;color:var(--text3)">タップして種を植える</div>
      </div>`;
    const c = p.plant.cond;
    const [hClass,hLabel] = healthStatus(p.health);
    const stages = Array(6).fill(false).map((_,s)=>s<=p.stage);
    return `
      <div class="planter-card">
        <div class="planter-card-header">
          <div class="plant-icon">${p.stage>=4?p.plant.emoji:p.stage>=2?'🌿':'🌱'}</div>
          <div class="plant-header-info">
            <div class="plant-name">${p.plant.name}</div>
            <div class="plant-stage-label">${STAGES[p.stage]} · ${p.age}ターン経過</div>
          </div>
          <div class="health-badge h-${hClass}">${hLabel} ${Math.round(p.health)}%</div>
        </div>
        <div class="planter-params">
          ${[['🌡️ 温度','temp','℃',c.temp],['💧 水分','water','%',c.water],['🧪 pH','ph','',c.ph],['🌿 肥料','fert','%',c.fert],['☀️ 日照','light','%',c.light]].map(([l,k,u,r])=>`
            <div class="param-row">
              <div class="param-lbl">${l}</div>
              <div class="bar-bg"><div class="bar-fill ${barClass(p.params[k],r)}" style="width:${k==='ph'?(p.params[k]/14*100).toFixed(0):p.params[k]}%"></div></div>
              <div class="param-val">${p.params[k]}${u}</div>
            </div>`).join('')}
        </div>
        <div class="growth-bar">${stages.map(s=>`<div class="growth-seg ${s?'done':''}"></div>`).join('')}</div>
        <div class="planter-actions">
          <button class="chip chip-green" onclick="adjust(${i},'water',15)">💧 水やり</button>
          <button class="chip chip-green" onclick="adjust(${i},'fert',20)">🌿 肥料</button>
          <button class="chip chip-green" onclick="tempModal(${i})">🌡️ 温度</button>
          ${p.stage>=5?`<button class="chip" style="background:var(--gold2);color:var(--gold);border-color:var(--gold)" onclick="harvest(${i})">🌸 収穫</button>`:''}
        </div>
      </div>`;
  }).join('');
}

function adjust(slot, key, delta) {
  const p = S.planters[slot]; if(!p) return;
  p.params[key] = clamp(p.params[key]+delta, 0, key==='ph'?14:100);
  renderPlanter();
}

function tempModal(slot) {
  const p = S.planters[slot];
  showModal(`
    <h2>🌡️ 温度調整</h2>
    <p>現在: <strong style="color:var(--green)">${p.params.temp}℃</strong>　最適: ${p.plant.cond.temp[0]}〜${p.plant.cond.temp[1]}℃</p>
    <input type="range" min="0" max="45" value="${p.params.temp}" id="tempSlider" oninput="document.getElementById('tempVal').textContent=this.value+'℃'" style="width:100%;accent-color:var(--green);margin-bottom:8px">
    <div id="tempVal" style="text-align:center;font-size:18px;color:var(--green);margin-bottom:12px">${p.params.temp}℃</div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">戻る</button>
      <button class="btn btn-primary" onclick="S.planters[${slot}].params.temp=+document.getElementById('tempSlider').value;closeModal();renderPlanter()">設定</button>
    </div>`);
}

function harvest(slot) {
  const p = S.planters[slot];
  const isNew = !S.discoveries[p.plant.id];
  if(isNew) {
    S.discoveries[p.plant.id] = true;
    showModal(`
      <h2>🌟 新種発見！</h2>
      <div style="font-size:48px;text-align:center;margin:8px 0">${p.plant.emoji}</div>
      <p>この植物を初めて育て上げました。名前をつけられます！</p>
      <input id="nameInput" placeholder="${p.plant.name}" style="margin-bottom:12px">
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="doHarvest(${slot},null)">後で命名</button>
        <button class="btn btn-gold" onclick="doHarvest(${slot},document.getElementById('nameInput').value)">命名して収穫</button>
      </div>`);
  } else {
    doHarvest(slot, null);
  }
}

function doHarvest(slot, customName) {
  const p = S.planters[slot];
  const num = rand(p.plant.seeds[0], p.plant.seeds[1]);
  if(customName && customName.trim()) {
    toast(`✏️「${customName.trim()}」と命名しました`, 'gold');
  }
  for(let i=0;i<num;i++) S.seeds.push({ id:uid(), plant:p.plant, reveal:'species', label:p.plant.name });
  S.planters[slot] = null;
  closeModal(); updateStats();
  toast(`🌸 収穫完了！種×${num}を入手`, 'gold');
  if(S.tab==='planter') renderPlanter();
}

function showPlantPicker(slot) {
  if(S.seeds.length===0){ toast('種袋が空です。地図で種を拾いましょう'); return; }
  showModal(`
    <h2>種を選んで植える</h2>
    <p>プランター${slot+1}番に植える種：</p>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto">
      ${S.seeds.map(s=>`
        <div class="gene-option" onclick="plantSeed('${s.id}',${slot})">
          <div style="font-size:22px">${s.reveal==='species'?s.plant.emoji:'🌰'}</div>
          <div>
            <div style="font-size:14px;font-weight:700">${s.label}</div>
            <div class="r-${s.plant.rarity}" style="font-size:11px">${RARITY[s.plant.rarity].label}</div>
          </div>
        </div>`).join('')}
    </div>
    <button class="btn btn-secondary" style="margin-top:12px" onclick="closeModal()">戻る</button>`);
}

// =====================================================
// GENE
// =====================================================
function renderGene() {
  const el = document.getElementById('geneContent');
  const grown = S.planters.filter(p=>p&&p.stage>=5);
  const [s1,s2] = S.hybridSlots;

  el.innerHTML = `
    <div class="gene-section">
      <div class="section-label">親株 A</div>
      ${geneSlotHTML(s1, grown.filter(p=>!s2||p.id!==s2.id), 0)}
      <div class="section-label" style="margin-top:12px">親株 B</div>
      ${geneSlotHTML(s2, grown.filter(p=>!s1||p.id!==s1.id), 1)}
      <button class="btn btn-purple" style="width:100%;margin-top:16px" onclick="doCross()" ${s1&&s2?'':'disabled'} style="${s1&&s2?'':'opacity:.4'}">
        🧬 交配する
      </button>
      <div id="crossResult"></div>
    </div>`;
}

function geneSlotHTML(selected, options, idx) {
  if(selected) {
    const p = selected.plant;
    return `<div class="gene-slot filled">
      <div class="gene-slot-header">
        <div class="gene-slot-icon">${p.emoji}</div>
        <div class="gene-slot-name">${p.name}</div>
        <button class="chip chip-gold" onclick="S.hybridSlots[${idx}]=null;renderGene()">解除</button>
      </div>
      <div class="gene-traits">${Object.values(p.traits).map(v=>`<span class="trait-chip">${v}</span>`).join('')}</div>
      <div style="font-size:11px;color:var(--text3)">${Object.entries(p.genes).map(([k,v])=>`${k}:${v}`).join(' / ')}</div>
    </div>`;
  }
  if(options.length===0) {
    return `<div class="gene-slot"><div style="color:var(--text3);font-size:13px;font-style:italic;padding:8px 0">結実した植物がありません。<br>プランターで植物を育てましょう。</div></div>`;
  }
  return `<div class="gene-slot">
    <div style="color:var(--text3);font-size:12px;margin-bottom:8px">親株を選択：</div>
    <div class="gene-select">
      ${options.map(p=>`
        <div class="gene-option" onclick="S.hybridSlots[${idx}]=S.planters.find(x=>x&&x.id==='${p.id}');renderGene()">
          <div style="font-size:22px">${p.plant.emoji}</div>
          <div>
            <div style="font-size:14px;font-weight:700">${p.plant.name}</div>
            <div style="font-size:11px;color:var(--text3)">${STAGES[p.stage]}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function doCross() {
  const [p1,p2] = S.hybridSlots;
  if(!p1||!p2) return;
  function crossGene(g1,g2) {
    const a=[...g1,...g2]; return a[rand(0,1)]+a[rand(2,3)];
  }
  const newGenes={};
  Object.keys(p1.plant.genes).forEach(k=>{ newGenes[k]=crossGene(p1.plant.genes[k],p2.plant.genes[k]); });
  const newTraits={};
  Object.keys(p1.plant.traits).forEach((k,i)=>{
    newTraits[k]=Math.random()<.5?Object.values(p1.plant.traits)[i]:Object.values(p2.plant.traits)[i];
  });
  const rarityIdx = Math.min(3, Math.round((['common','uncommon','rare','legendary'].indexOf(p1.plant.rarity)+['common','uncommon','rare','legendary'].indexOf(p2.plant.rarity))/2)+(Math.random()<.1?1:0));
  const rKeys=['common','uncommon','rare','legendary'];
  const hybrid = {
    id:'h_'+uid(), name:`${p1.plant.name}×${p2.plant.name}`,
    sci:`${p1.plant.sci.split(' ')[0]} × ${p2.plant.sci.split(' ')[0]}`,
    emoji:Math.random()<.5?p1.plant.emoji:p2.plant.emoji,
    rarity:rKeys[rarityIdx], traits:newTraits, genes:newGenes,
    cond:{ temp:[Math.round((p1.plant.cond.temp[0]+p2.plant.cond.temp[0])/2),Math.round((p1.plant.cond.temp[1]+p2.plant.cond.temp[1])/2)],
           ph:[+((p1.plant.cond.ph[0]+p2.plant.cond.ph[0])/2).toFixed(1),+((p1.plant.cond.ph[1]+p2.plant.cond.ph[1])/2).toFixed(1)],
           water:[Math.round((p1.plant.cond.water[0]+p2.plant.cond.water[0])/2),Math.round((p1.plant.cond.water[1]+p2.plant.cond.water[1])/2)],
           fert:[Math.round((p1.plant.cond.fert[0]+p2.plant.cond.fert[0])/2),Math.round((p1.plant.cond.fert[1]+p2.plant.cond.fert[1])/2)],
           light:[Math.round((p1.plant.cond.light[0]+p2.plant.cond.light[0])/2),Math.round((p1.plant.cond.light[1]+p2.plant.cond.light[1])/2)] },
    growth:Math.round((p1.plant.growth+p2.plant.growth)/2), seeds:[1,rand(2,5)],
  };
  S.seeds.push({ id:uid(), plant:hybrid, reveal:'full', label:hybrid.name });
  S.hybridSlots=[null,null];
  updateStats();
  document.getElementById('crossResult').innerHTML=`
    <div class="cross-result">
      <div class="cross-result-icon">${hybrid.emoji}</div>
      <div class="cross-result-name">${hybrid.name}</div>
      <div class="r-${hybrid.rarity}" style="font-size:12px;margin-bottom:8px">${RARITY[hybrid.rarity].label}</div>
      <div style="font-size:12px;color:var(--text3)">種袋に追加されました！</div>
    </div>`;
  toast('🧬 交配成功！新種の種を入手', 'rare');
}

let marketTab = 'buy';
function renderMarket() {
  const el = document.getElementById('marketContent');
  el.innerHTML=`
    <div class="market-section">
      <div class="market-tabs">
        <button class="market-tab ${marketTab==='buy'?'active':''}" onclick="marketTab='buy';renderMarket()">購入する</button>
        <button class="market-tab ${marketTab==='sell'?'active':''}" onclick="marketTab='sell';renderMarket()">出品する</button>
      </div>
      ${marketTab==='buy' ? renderBuyTab() : renderSellTab()}
    </div>`;
}
function renderBuyTab() {
  return MARKET_DATA.map(l=>`
    <div class="listing-card">
      <div class="listing-icon">${l.plant.emoji}</div>
      <div class="listing-info">
        <div class="listing-name">${l.plant.name}</div>
        <div class="listing-seller">${l.seller} · 残り${l.qty}個</div>
      </div>
      <div class="listing-price">
        <div class="price">${l.price}G</div>
        <div class="qty">${l.plant.rarity}</div>
        <button class="chip chip-gold" style="margin-top:4px" onclick="buyListing('${l.id}',${l.price},'${l.plant.id}')">購入</button>
      </div>
    </div>`).join('');
}
function renderSellTab() {
  if(S.seeds.length===0) return `<div class="empty-state"><div class="icon">🌰</div><p>出品できる種がありません</p></div>`;
  return S.seeds.map(s=>`
    <div class="listing-card">
      <div class="listing-icon">${s.reveal==='species'?s.plant.emoji:'🌰'}</div>
      <div class="listing-info">
        <div class="listing-name">${s.label}</div>
        <div class="listing-seller r-${s.plant.rarity}">${RARITY[s.plant.rarity].label}</div>
      </div>
      <button class="chip chip-gold" onclick="listSeed('${s.id}')">出品</button>
    </div>`).join('');
}
function buyListing(lid, price, plantId) {
  if(S.gold<price){ toast('所持金が足りません'); return; }
  const plant = PLANTS.find(p=>p.id===plantId)||PLANTS[0];
  S.gold -= price;
  S.seeds.push({ id:uid(), plant, reveal:'species', label:plant.name });
  updateStats(); renderMarket();
  toast(`🏪 ${plant.name}を${price}Gで購入`, 'gold');
}
function listSeed(seedId) {
  const s = S.seeds.find(x=>x.id===seedId);
  if(!s) return;
  const suggested = {common:30,uncommon:80,rare:200,legendary:1000}[s.plant.rarity];
  showModal(`
    <h2>出品する</h2>
    <p>「${s.label}」を市場に出品します</p>
    <input type="number" id="priceIn" value="${suggested}" min="1" placeholder="価格 (G)">
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">戻る</button>
      <button class="btn btn-primary" onclick="confirmList('${seedId}')">出品する</button>
    </div>`);
}
function confirmList(seedId) {
  const price = parseInt(document.getElementById('priceIn').value)||30;
  const s = S.seeds.find(x=>x.id===seedId); if(!s) return;
  S.seeds = S.seeds.filter(x=>x.id!==seedId);
  S.gold += Math.round(price*.9);
  closeModal(); updateStats(); renderMarket();
  toast(`🏪 出品完了 +${Math.round(price*.9)}G`, 'gold');
}

// =====================================================
// MODAL
// =====================================================
function showModal(html) {
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBg').style.display = 'flex';
}
function closeModal(e) {
  if(e && e.target !== document.getElementById('modalBg')) return;
  document.getElementById('modalBg').style.display = 'none';
}
function closeModal() { document.getElementById('modalBg').style.display = 'none'; }

// =====================================================
// INIT
// =====================================================
updateStats();
initMap();
</script>
</body>
</html>
